  <style>
    /* Contact Panel Specific Styles */
    body.page-join {
      background: linear-gradient(160deg, #f5f0e8 0%, #ede8df 40%, #e2dbd0 100%);
      min-height: 100vh;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
    }

    .contact-panel {
      max-width: 900px;
      margin: 120px auto;
      padding: 80px 60px;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.05);
      text-align: center;
      opacity: 0;
      transform: translateY(30px);
      animation: panelFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.4s;
    }

    @keyframes panelFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .panel-header {
      margin-bottom: 60px;
    }

    .panel-header h1 {
      font-family: var(--serif);
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .panel-header p {
      font-size: 1.1rem;
      color: var(--grey);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Email / Phone Section */
    .email-container {
      margin-bottom: 0;
    }

    .email-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .contact-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(15px, 2.5vw, 20px);
      color: var(--text);
      text-decoration: none;
      font-family: var(--serif);
      font-weight: 600;
      transition: color 0.25s ease;
    }

    .contact-item:hover {
      color: var(--gold);
    }

    .contact-item svg {
      flex-shrink: 0;
      color: var(--gold);
    }

    .contact-divider {
      width: 60px;
      height: 1.5px;
      background: rgba(201,168,76,0.3);
      margin: 32px auto;
    }

    @media (max-width: 768px) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      .contact-panel {
        margin: 80px 24px;
        padding: 40px 20px;
        opacity: 1 !important;
        transform: none !important;
      }
      .contact-item {
        font-size: 15px;
        word-break: break-all;
      }
    }
  </style>
</head>
